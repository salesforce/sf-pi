name: CI

on:
  push:
    branches:
      - main
  pull_request:
  # Allow release-please to dispatch CI on the release PR branch
  # (GITHUB_TOKEN-opened PRs don't fire pull_request events on their own).
  workflow_dispatch:

# Cancel in-progress runs on the same branch/PR when a new commit lands.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Default to least privilege. Escalate per-job only if needed.
permissions:
  contents: read

jobs:
  # Fast lane: one Node version, no coverage upload, no cross-SDK overlay.
  # Broader matrix + latest-pi-compat moved to the nightly workflow.
  validate:
    name: Validate
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Build-only job; no git pushes. Don't persist GITHUB_TOKEN in
          # .git/config so later steps / artifacts cannot leak it
          # (artipacked).
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Check generated catalog
        run: npm run generate-catalog:check

      - name: Check docs health
        run: npm run docs:health:check

      - name: Check SPDX headers
        run: npm run spdx:check

      - name: Check formatting
        run: npm run format:check

      - name: Lint
        run: npm run eslint

      - name: Type check
        run: npm run check

      - name: Run tests
        run: npm test

      - name: LLM artifact check
        # Fails on unresolved conflict markers, prompt-template tokens,
        # and unresolved TODO(llm|agent|claude|gpt|pi) markers.
        # See scripts/check-llm-artifacts.sh for the exact rules.
        run: bash scripts/check-llm-artifacts.sh

  commitlint:
    name: commitlint
    # Contributor PRs get real commitlint. Release-please PRs are opened /
    # updated by GITHUB_TOKEN, so pull_request workflows do not fire; CI is
    # dispatched manually on the release branch instead. Because commitlint is
    # a required status check, workflow_dispatch release branches need this
    # job to produce a successful no-op check with the same name.
    if: >-
      github.event_name == 'pull_request' ||
      startsWith(github.ref_name, 'release-please--')
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        if: github.event_name == 'pull_request'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Full history for `commitlint --from BASE --to HEAD` but no
          # push access needed. Don't persist credentials (artipacked).
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Node.js
        if: github.event_name == 'pull_request'
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        if: github.event_name == 'pull_request'
        run: npm ci --legacy-peer-deps

      - name: Lint PR commits against commitlint.config.mjs
        if: github.event_name == 'pull_request'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: npx --no -- commitlint --from "$BASE_SHA" --to "$HEAD_SHA" --verbose

      - name: Release-please branch commitlint no-op
        if: github.event_name != 'pull_request'
        run: |
          echo "release-please branch: generated conventional commits; satisfying required commitlint check"

  audit:
    name: npm audit (production)
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Read-only audit step; no credentials needed (artipacked).
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run npm audit (production only, fail on high)
        run: npm audit --omit=dev --audit-level=high

  # Solo-maintainer fast path. GitHub Free + private repos cannot use the
  # built-in 'Allow auto-merge' (requires Pro + branch protection), and
  # cross-workflow workflow_run triggers don't fire reliably for
  # workflow_dispatch-originated CI runs on non-default branches. So we
  # drive the merge inline from CI itself on release-please branches.
  #
  # Event-context gotchas baked in below (learned the hard way on v0.24.0):
  #   - `github.ref_name`  is `15/merge`    on pull_request events,
  #                        the branch name on push/workflow_dispatch.
  #   - `github.head_ref`  is the PR head branch on pull_request events,
  #                        empty             on push/workflow_dispatch.
  #   - `github.sha`       is the test-merge commit on pull_request events,
  #                        the head commit   on push/workflow_dispatch.
  # So we OR the branch names in the `if:` and prefer the PR head SHA when
  # present. That way auto-merge reliably runs whether release-please's
  # initial workflow_dispatch triggers CI or a close+reopen fires the
  # pull_request path.
  auto-merge-release-pr:
    name: Auto-merge release PR
    runs-on: ubuntu-latest
    needs: [validate, audit]
    if: >-
      success() &&
      (
        startsWith(github.head_ref, 'release-please--') ||
        startsWith(github.ref_name, 'release-please--')
      )
    permissions:
      contents: write
      pull-requests: write
      actions: write # to re-dispatch release-please
      checks: read # to poll gitleaks status on the same SHA
    steps:
      - name: Resolve PR head branch + SHA
        id: ctx
        env:
          HEAD_REF: ${{ github.head_ref }}
          REF_NAME: ${{ github.ref_name }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PUSH_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          # On pull_request the head branch lives in HEAD_REF; on push /
          # workflow_dispatch it's in REF_NAME. Fall back to REF_NAME so
          # the legacy workflow_dispatch path keeps working.
          BRANCH="${HEAD_REF:-$REF_NAME}"
          # On pull_request the PR head SHA is what checks are attached to;
          # on push / workflow_dispatch github.sha already points at the
          # head commit.
          SHA="${PR_HEAD_SHA:-$PUSH_SHA}"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "Resolved branch=$BRANCH sha=$SHA"

      - name: Find release PR
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: ${{ steps.ctx.outputs.branch }}
        run: |
          set -euo pipefail
          PR_JSON=$(gh pr list \
            --repo "$GITHUB_REPOSITORY" \
            --head "$BRANCH" \
            --state open \
            --json number,title,author \
            --limit 1)
          PR_NUMBER=$(echo "$PR_JSON" | jq -r '.[0].number // empty')
          PR_AUTHOR=$(echo "$PR_JSON" | jq -r '.[0].author.login // empty')
          if [ -z "$PR_NUMBER" ]; then
            echo "No open PR for $BRANCH; nothing to merge."
            exit 0
          fi
          case "$PR_AUTHOR" in
            github-actions | github-actions"[bot]" | app/github-actions) ;;
            *)
              echo "PR #$PR_NUMBER author '$PR_AUTHOR' is not release-please; skipping."
              exit 0
              ;;
          esac
          echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          echo "Found release PR #$PR_NUMBER"

      - name: Wait for gitleaks to conclude
        if: steps.pr.outputs.pr_number != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HEAD_SHA: ${{ steps.ctx.outputs.sha }}
        run: |
          set -euo pipefail
          for attempt in $(seq 1 30); do
            STATE=$(gh api \
              -H "Accept: application/vnd.github+json" \
              "repos/$GITHUB_REPOSITORY/commits/$HEAD_SHA/check-runs?check_name=gitleaks" \
              --jq '[.check_runs[] | {status, conclusion}] | .[0] // {status:"queued", conclusion:null}')
            STATUS=$(echo "$STATE" | jq -r '.status')
            CONCLUSION=$(echo "$STATE" | jq -r '.conclusion // ""')
            echo "attempt $attempt: gitleaks status=$STATUS conclusion=$CONCLUSION"
            if [ "$STATUS" = "completed" ]; then
              case "$CONCLUSION" in
                success|neutral|skipped) echo "gitleaks ok"; exit 0 ;;
                *) echo "::error::gitleaks concluded with '$CONCLUSION'; aborting merge."; exit 1 ;;
              esac
            fi
            sleep 10
          done
          echo "::error::gitleaks did not complete within the wait window; aborting merge."
          exit 1

      - name: Enable auto-merge on release PR
        if: steps.pr.outputs.pr_number != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR: ${{ steps.pr.outputs.pr_number }}
        # Why --auto instead of an immediate merge:
        #   The main branch ruleset requires 9 status checks + PR before
        #   merge. The job we're in right now is itself one of those
        #   required checks, so an immediate `gh pr merge` deadlocks:
        #   "required check 'CI' has not completed" (it can't complete
        #   until this step returns). --admin would bypass, but
        #   github-actions[bot] is not on the ruleset's bypass_actors
        #   list — only the admin RepositoryRole is — so --admin errors
        #   out with "base branch policy prohibits the merge."
        #
        #   --auto has GitHub queue the merge and execute it as soon as
        #   every required check reports success, with no bypass
        #   required. For the release PR that typically means: CI + OSV
        #   + License + Workflow lint + gitleaks + npm audit all
        #   conclude, then GitHub merges the PR and deletes the branch.
        run: |
          set -euo pipefail
          gh pr merge "$PR" \
            --repo "$GITHUB_REPOSITORY" \
            --auto \
            --squash \
            --delete-branch

      - name: Re-dispatch release-please to cut the tag
        if: steps.pr.outputs.pr_number != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR: ${{ steps.pr.outputs.pr_number }}
        run: |
          set -euo pipefail
          # `gh pr merge --auto` queues the merge and returns before GitHub
          # necessarily finishes it. If we dispatch release-please immediately,
          # it can observe the still-open release PR and re-dispatch checks in a
          # loop. Wait until the PR is actually merged, then kick release-please
          # once so the squash commit gets tagged.
          for attempt in $(seq 1 60); do
            STATE=$(gh pr view "$PR" \
              --repo "$GITHUB_REPOSITORY" \
              --json state,mergedAt,mergeCommit \
              --jq '{state, mergedAt, mergeCommit}')
            STATE_NAME=$(echo "$STATE" | jq -r '.state')
            MERGED_AT=$(echo "$STATE" | jq -r '.mergedAt // ""')
            MERGE_SHA=$(echo "$STATE" | jq -r '.mergeCommit.oid // ""')
            echo "attempt $attempt: state=$STATE_NAME mergedAt=$MERGED_AT mergeSha=$MERGE_SHA"
            if [ "$STATE_NAME" = "MERGED" ] && [ -n "$MERGED_AT" ]; then
              gh workflow run release-please.yml \
                --repo "$GITHUB_REPOSITORY" \
                --ref main
              exit 0
            fi
            if [ "$STATE_NAME" = "CLOSED" ]; then
              echo "::error::Release PR closed without merge; not dispatching release-please."
              exit 1
            fi
            sleep 10
          done
          echo "::error::Timed out waiting for release PR #$PR to merge."
          exit 1
