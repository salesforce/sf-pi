name: Secret scan (gitleaks)

on:
  push:
    branches:
      - main
  pull_request:
  # Dispatchable by release-please on the release PR branch.
  workflow_dispatch:
  schedule:
    # Weekly full scan in case a leaked secret slipped in historically.
    - cron: "17 7 * * 1"

concurrency:
  group: gitleaks-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

# Why we run the gitleaks binary directly (no gitleaks-action wrapper):
#   The gitleaks/gitleaks-action@v2 wrapper requires a paid license
#   (GITLEAKS_LICENSE) for any repo owned by a GitHub organization,
#   even public ones. The MIT-licensed gitleaks CLI itself is free.
#   Running the binary gives us the same detection with no license
#   dependency and slightly faster runs.

env:
  GITLEAKS_VERSION: "8.30.1"

jobs:
  scan:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Full history so scheduled scans and PR scans can walk all commits.
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          set -euo pipefail
          curl -sSLf \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            -o /tmp/gitleaks.tgz
          tar -xzf /tmp/gitleaks.tgz -C /tmp gitleaks
          sudo mv /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Scan (pull request — changed commits only)
        if: github.event_name == 'pull_request'
        run: |
          set -euo pipefail
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"
          echo "Scanning $BASE..$HEAD"
          gitleaks detect \
            --source . \
            --log-opts="$BASE..$HEAD" \
            --redact \
            --verbose \
            --exit-code 1 \
            --report-format sarif \
            --report-path gitleaks.sarif

      - name: Scan (push / schedule / dispatch — full history)
        if: github.event_name != 'pull_request'
        run: |
          set -euo pipefail
          gitleaks detect \
            --source . \
            --redact \
            --verbose \
            --exit-code 1 \
            --report-format sarif \
            --report-path gitleaks.sarif

      - name: Upload SARIF report
        if: always() && hashFiles('gitleaks.sarif') != ''
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: gitleaks-sarif
          path: gitleaks.sarif
          retention-days: 30

      # Secondary secret scan. Trufflehog's detectors overlap with gitleaks
      # but catch a different tail of credential patterns (e.g. AWS cross-
      # account role ARNs, Slack legacy tokens, private-key fragments).
      # We run it after gitleaks so a first-line fail still shows up clearly
      # in the gitleaks step, but we gate CI on both.
      - name: Trufflehog secret scan (diff on PRs, full history otherwise)
        uses: trufflesecurity/trufflehog@17456f8c7d042d8c82c9a8ca9e937231f9f42e26 # v3.95.2
        with:
          # Only scan the PR diff on pull_request; full repo on push/schedule.
          path: ./
          base: ${{ github.event.pull_request.base.sha || '' }}
          head: ${{ github.event.pull_request.head.sha || github.sha }}
          extra_args: --only-verified
