name: CodeQL

# CodeQL is slow and the findings are rarely push-blocking for this repo.
# Run it weekly on a schedule + on-demand via workflow_dispatch. Gitleaks
# still scans every push/PR for secrets, which is the higher-signal check.
on:
  schedule:
    - cron: "23 4 * * 2"
  workflow_dispatch:

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    # CodeQL on private repos requires GitHub Advanced Security. Skip if not
    # available. Public repos get CodeQL for free.
    if: github.repository_visibility == 'public' || github.event.repository.visibility == 'public'

    permissions:
      # required for all workflows
      security-events: write
      # required to fetch internal or private CodeQL packs
      packages: read

    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript]

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Read-only scan; no git pushes. Keeps GITHUB_TOKEN out of
          # .git/config (artipacked).
          persist-credentials: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          languages: ${{ matrix.language }}
          queries: +security-and-quality
          config-file: ./.github/codeql/codeql-config.yml

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          category: "/language:${{ matrix.language }}"
