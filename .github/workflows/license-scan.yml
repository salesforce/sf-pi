# SPDX-License-Identifier: Apache-2.0
# Fail CI if a production npm dependency ships under a copyleft or
# otherwise-restrictive license. Catches drift at the transitive level
# that package.json doesn't surface.
name: License scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scan:
    name: License scan (production deps)
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Read-only scan (artipacked).
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies (production only)
        run: npm ci --omit=dev --ignore-scripts --legacy-peer-deps

      - name: Run license-checker
        run: |
          npx --yes license-checker-rseidelsohn \
            --production \
            --onlyAllow 'Apache-2.0;MIT;BSD-2-Clause;BSD-3-Clause;ISC;0BSD;CC0-1.0;CC-BY-3.0;CC-BY-4.0;Unlicense;Python-2.0;WTFPL;BlueOak-1.0.0' \
            --excludePrivatePackages \
            --summary
