# SPDX-License-Identifier: Apache-2.0
# Block new vulnerable or license-incompatible dependencies on PRs.
# Runs only on pull_request so that direct admin pushes to main aren't
# affected (that path is guarded by npm audit + OSV scanner in CI).
name: Dependency review

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    name: Dependency review
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Review dependencies
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4.9.0
        with:
          fail-on-severity: high
          # Block GPL-family + SSPL + commercial licenses in new deps.
          # Apache-2.0 / MIT / BSD / ISC / 0BSD / CC0-1.0 / Unlicense are allowed.
          # If this ever rejects a dep you need, add an allow-list override
          # here and mention it in the PR description.
          deny-licenses: >-
            GPL-1.0-only,GPL-1.0-or-later,GPL-2.0-only,GPL-2.0-or-later,
            GPL-3.0-only,GPL-3.0-or-later,AGPL-1.0-only,AGPL-1.0-or-later,
            AGPL-3.0-only,AGPL-3.0-or-later,LGPL-2.0-only,LGPL-2.0-or-later,
            LGPL-2.1-only,LGPL-2.1-or-later,LGPL-3.0-only,LGPL-3.0-or-later,
            SSPL-1.0,BUSL-1.1
          comment-summary-in-pr: on-failure
