name: Sync @agentscript/agentforce SDK

# Weekly check for upstream drift. Opens a PR when the vendored bundle
# differs from what the pinned commit produces. Never auto-merges — a
# maintainer reviews the PR and decides whether to accept the bump.
#
# Also supports manual runs via the GitHub UI for ad-hoc syncs.

on:
  schedule:
    # Every Monday at 09:00 UTC.
    - cron: "0 9 * * 1"
  workflow_dispatch:
    inputs:
      ref:
        description: "Upstream ref (commit SHA or tag) to sync to"
        required: false
        default: ""

concurrency:
  group: sync-agentforce-sdk
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  sync:
    name: Refresh vendored dist
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22

      - name: Run sync script (pinned SHA)
        if: ${{ github.event.inputs.ref == '' }}
        run: node scripts/sync-agentforce-sdk.mjs

      - name: Run sync script (manual ref)
        if: ${{ github.event.inputs.ref != '' }}
        run: node scripts/sync-agentforce-sdk.mjs --ref ${{ github.event.inputs.ref }}

      - name: Install sf-pi dependencies
        run: npm ci --legacy-peer-deps

      - name: Validate
        run: |
          npm run generate-catalog:check
          npm run check
          npx vitest run extensions/sf-agentscript-assist/

      - name: Create pull request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          commit-message: |
            chore(sf-agentscript-assist): sync @agentscript/agentforce bundle
          title: "chore(sf-agentscript-assist): sync @agentscript/agentforce bundle"
          body: |
            Automated weekly sync of the vendored `@agentscript/agentforce`
            bundle in `extensions/sf-agentscript-assist/lib/vendor/agentforce/`.

            This PR is generated by `.github/workflows/sync-agentforce-sdk.yml`
            which runs `scripts/sync-agentforce-sdk.mjs` against the pinned
            upstream commit. If this PR exists, the committed bundle drifted
            from what the pin produces — review the diff and merge if the
            change looks reasonable, or close this PR and bump
            `UPSTREAM_SHA` in the sync script if you want to pin to a new
            upstream commit.

            See `extensions/sf-agentscript-assist/lib/vendor/agentforce/UPSTREAM.md`
            for the new commit SHA and version.
          branch: chore/sync-agentforce-sdk
          delete-branch: true
          labels: |
            dependencies
            automated
