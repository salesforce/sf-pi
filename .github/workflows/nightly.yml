name: Nightly extended checks

# Runs the slower / broader-compat checks that used to live in CI on every
# push. Schedule is UTC; also manually dispatchable so you can re-run
# on-demand if something looks off.
on:
  schedule:
    - cron: "17 6 * * *" # 06:17 UTC daily
  workflow_dispatch:

concurrency:
  group: nightly-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  matrix:
    name: Validate (Node ${{ matrix.node }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        # pi >= 0.75 requires Node >= 22.19. Keep this lane equal to the
        # supported range until pi advertises a higher floor.
        node: [22]

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Test job only (plus codecov upload via the codecov action
          # which handles its own auth). No git pushes (artipacked).
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts --legacy-peer-deps

      - name: Run tests with coverage
        run: npx vitest run --coverage

      - name: Upload coverage to Codecov
        if: matrix.node == 22
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: ./coverage/lcov.info
          flags: unittests
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  pi-window-compat:
    name: Pi ${{ matrix.pi-version }} compatibility
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        pi-version: ["0.81.1"]

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Compat test job; no git pushes (artipacked).
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: npm

      - name: Install locked dependencies
        run: npm ci --ignore-scripts --legacy-peer-deps

      - name: Overlay audited Pi packages
        run: >-
          npm install --legacy-peer-deps --no-save --package-lock=false
          @earendil-works/pi-coding-agent@${{ matrix.pi-version }}
          @earendil-works/pi-ai@${{ matrix.pi-version }}
          @earendil-works/pi-tui@${{ matrix.pi-version }}

      - name: Type check against Pi ${{ matrix.pi-version }}
        run: npm run check

      - name: Run tests against Pi ${{ matrix.pi-version }}
        run: npm test
