name: Nightly extended checks

# Runs the slower / broader-compat checks that used to live in CI on every
# push. Schedule is UTC; also manually dispatchable so you can re-run
# on-demand if something looks off.
on:
  schedule:
    - cron: "17 6 * * *" # 06:17 UTC daily
  workflow_dispatch:

concurrency:
  group: nightly-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  matrix:
    name: Validate (Node ${{ matrix.node }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        # pi >= 0.75 requires Node >= 22.19. Keep this lane equal to the
        # supported range until pi advertises a higher floor.
        node: [22]

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          # Test job only (plus codecov upload via the codecov action
          # which handles its own auth). No git pushes (artipacked).
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts --legacy-peer-deps

      - name: Run tests with coverage
        run: npx vitest run --coverage

      - name: Upload coverage to Codecov
        if: matrix.node == 22
        uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354 # v6.0.1
        with:
          files: ./coverage/lcov.info
          flags: unittests
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  latest-pi-compat:
    name: Latest Pi SDK compatibility
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          # Compat test job; no git pushes (artipacked).
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm

      - name: Install locked dependencies
        run: npm ci --ignore-scripts --legacy-peer-deps

      - name: Overlay latest Pi packages
        run: >-
          npm install --legacy-peer-deps --no-save --package-lock=false
          @earendil-works/pi-coding-agent@latest
          @earendil-works/pi-ai@latest
          @earendil-works/pi-tui@latest

      - name: Type check against latest Pi packages
        run: npm run check

      - name: Run tests against latest Pi packages
        run: npm test
