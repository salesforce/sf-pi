name: Nightly extended checks

# Runs the slower / broader-compat checks that used to live in CI on every
# push. Schedule is UTC; also manually dispatchable so you can re-run
# on-demand if something looks off.
on:
  schedule:
    - cron: "17 6 * * *" # 06:17 UTC daily
  workflow_dispatch:

concurrency:
  group: nightly-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  matrix:
    name: Validate (Node ${{ matrix.node }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        node: [20, 22]

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Test job only (plus codecov upload via the codecov action
          # which handles its own auth). No git pushes (artipacked).
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run tests with coverage
        run: npx vitest run --coverage

      - name: Upload coverage to Codecov
        if: matrix.node == 20
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          files: ./coverage/lcov.info
          flags: unittests
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  latest-pi-compat:
    name: Latest Pi SDK compatibility
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Compat test job; no git pushes (artipacked).
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm

      - name: Install locked dependencies
        run: npm ci --legacy-peer-deps

      - name: Overlay latest Pi packages
        run: >-
          npm install --legacy-peer-deps --no-save --package-lock=false
          @mariozechner/pi-coding-agent@latest
          @mariozechner/pi-ai@latest
          @mariozechner/pi-tui@latest

      - name: Type check against latest Pi packages
        run: npm run check

      - name: Run tests against latest Pi packages
        run: npm test
