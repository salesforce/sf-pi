version: 2

updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "05:00"
      timezone: "America/Los_Angeles"
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - npm
    groups:
      dev-minor-and-patch:
        dependency-type: development
        update-types:
          - minor
          - patch
      prod-minor-and-patch:
        dependency-type: production
        update-types:
          - minor
          - patch
    # Ignore peer-dependency major bumps; those need manual review.
    ignore:
      - dependency-name: "@mariozechner/*"
        update-types:
          - version-update:semver-major

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "05:00"
      timezone: "America/Los_Angeles"
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions
    groups:
      actions-minor-and-patch:
        update-types:
          - minor
          - patch
