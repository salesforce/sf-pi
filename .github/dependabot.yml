version: 2

updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "05:00"
      timezone: "America/Los_Angeles"
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - npm
    # Supply-chain defense: delay PRs for freshly-published versions so
    # a compromised release (e.g. xz-utils-style attack) has time to be
    # discovered and yanked upstream before Dependabot proposes it here.
    # Patches ship faster than majors because they're lower-risk overall.
    cooldown:
      default-days: 7
      semver-major-days: 14
      semver-minor-days: 7
      semver-patch-days: 3
    groups:
      dev-minor-and-patch:
        dependency-type: development
        update-types:
          - minor
          - patch
      prod-minor-and-patch:
        dependency-type: production
        update-types:
          - minor
          - patch
    # Ignore peer-dependency major bumps; those need manual review.
    ignore:
      - dependency-name: "@mariozechner/*"
        update-types:
          - version-update:semver-major

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "05:00"
      timezone: "America/Los_Angeles"
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions
    # Same supply-chain cooldown rationale as the npm ecosystem above.
    cooldown:
      default-days: 7
      semver-major-days: 14
      semver-minor-days: 7
      semver-patch-days: 3
    groups:
      actions-minor-and-patch:
        update-types:
          - minor
          - patch
